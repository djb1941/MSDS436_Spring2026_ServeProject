simulation:
  name: "Default Scenario"
  duration_hours: 24
  start_time: "06:00"       # simulation clock starts at 6am

delivery_generation:
  type: "poisson"
  rate: 0.5                 # base rate: 0.5 deliveries per minute (~720/day)
  peak_hours:
    - hours: "11:00-13:00"  # lunch rush
      multiplier: 3.0       # 1.5 deliveries/min during this window
    - hours: "17:00-19:00"  # dinner rush
      multiplier: 2.5       # 1.25 deliveries/min during this window

constraints:
  robots_available: 5
  max_delivery_time_minutes: 30  # reject orders whose estimated delivery time exceeds this
  robot_speed_kmh: 6.0           # sidewalk robot cruising speed (~3.7 mph)
  pickup_minutes: 1.0            # time at restaurant to collect the order

# --- Idle robot behavior ---------------------------------------------------
# strategy options:
#   "stay"             — robots hold position after delivery (current default)
#   "post_restaurant"  — robots reposition to the nearest restaurant that has
#                        no other robot already posted there
#   "post_location"    — robots reposition to the nearest user-defined stand
#                        (taxi-stand style) defined in post_locations below
idle_behavior:
  strategy: "stay"

  # post_locations is only used when strategy = "post_location".
  # Define as many named lat/lon points as you like (within the simulation
  # boundary).  The dispatcher picks the closest unoccupied stand each time.
  post_locations:
    - name: "Brand Blvd & Broadway"
      lat: 34.1509
      lon: -118.2572
    - name: "Central Ave & California St"
      lat: 34.1478
      lon: -118.2488
    - name: "Colorado St & Louise St"
      lat: 34.1456
      lon: -118.2545
    - name: "Glendale Galleria Area"
      lat: 34.1494
      lon: -118.2601
    - name: "San Fernando Rd & Wilson Ave"
      lat: 34.1391
      lon: -118.2536
